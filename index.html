<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>حقيبة نمو - الدفعة الرابعة 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
      padding: 60px 20px;
      margin: 0;
    }

    .box {
      background: white;
      padding: 40px 30px;
      border-radius: 18px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    .thumb {
      width: 100%;
      max-width: 420px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      margin-bottom: 25px;
    }

    h1 {
      margin: 10px 0;
      color: #1f2a60;
      font-size: 32px;
    }

    h2 {
      margin: 10px 0 20px;
      color: #333;
      font-size: 24px;
    }

    p {
      font-size: 20px;
      color: #555;
      line-height: 1.9;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 15px 28px;
      background: #1f2a60;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
      transition: 0.3s;
    }

    a:hover {
      background: #2d3b85;
    }
  </style>
</head>
<body>

  <div class="box">
    <img src="cover.jpg" alt="صورة مصغرة للحقيبة التدريبية" class="thumb">

    <h1>الحقيبة التدريبية</h1>
    <h2>نمو - الدفعة الرابعة 2026</h2>

    <p>
      اضغطي الزر التالي لفتح ملف PDF في صفحة منفصلة.
    </p>

    <a href="bag.html" target="_blank">فتح الحقيبة PDF</a>
  </div>

</body>
</html>
